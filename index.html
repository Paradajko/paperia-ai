        "mainEntity": [
          {
            "@type": "Question",
            "name": "I'm from Serbia — do I need a work permit for Slovakia?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Visa-free entry for a short visit is not the same as permission to work or live in Slovakia. For employment, Serbian citizens generally need the correct employment and residence authorization for their situation. Your employer, job type, and length of stay affect the route, so verify the current requirements with the Slovak authorities or a licensed immigration lawyer."
            }
          },
          {
            "@type": "Question",
            "name": "How is this different from asking ChatGPT?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Riadence starts with a structured Slovakia-focused wizard instead of an open-ended chat. It collects the same practical inputs every time, organizes them into a route and document plan, and gives you a personalized PDF checklist. Ria chat is available afterwards for follow-up questions."
            }
          },
          {
            "@type": "Question",
            "name": "What does the free PDF checklist include?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "It includes your likely Slovakia residence route, documents you already have, likely missing items, translation or apostille reminders, a practical timeline, official-source links, and questions to verify before an appointment. It is general information, not a legal opinion."
            }
          },
          {
            "@type": "Question",
            "name": "Is Riadence a law firm? Can you guarantee my visa approval?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Riadence is not a law firm, Ria is not a lawyer, and nobody can guarantee a residence or visa outcome. Riadence helps you organize information and prepare better questions. A government authority makes the final decision."
            }
          },
          {
            "@type": "Question",
            "name": "When are the 2026 changes to Slovak residence law taking effect?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "There is no single blanket date that safely covers every 2026 change. Each amendment can have its own effective date and transitional rules. Check the current wording and effective date in Slov-Lex and confirm the requirement with the Slovak Ministry of Interior, a Slovak embassy, or a licensed immigration lawyer before filing."
            }
          },
          {
            "@type": "Question",
            "name": "What happens after I download the checklist? Do you follow up by email?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "You receive a welcome follow-up at the email you provided, and you can keep the PDF for your own preparation. Ria remains available in the completed wizard for practical follow-up questions. Riadence does not submit the application for you."
            }
          },
          {
            "@type": "Question",
            "name": "Do you handle complex cases like asylum or deportation?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Riadence is free for standard checklist preparation. Asylum, deportation defense, appeals, prior refusals, and other high-risk cases need a licensed professional. Riadence may recommend a partner agency or lawyer when the case is genuinely complex."
            }
          }
        ]
